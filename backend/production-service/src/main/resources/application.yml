server:
  port: 8083

spring:
  application:
    name: production-service
  datasource:
    url: jdbc:postgresql://localhost:5432/mes_production
    username: mes_user
    password: mes_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.mes: DEBUG
    org.springframework.security: INFO

mes:
  jwt:
    secret: your-secret-key-for-production-service-jwt-token-generation
    expiration: 86400000
